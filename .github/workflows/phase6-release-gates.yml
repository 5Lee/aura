name: Phase6 Release Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  functional-gate:
    name: Functional Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test -- __tests__/phase6-week23-ops-automation-notify-analytics-playbook.test.js

  performance-gate:
    name: Performance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test -- __tests__/lighthouse-performance-baseline.test.js

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test -- __tests__/phase4-week5-security-hardening.test.js

  release-block:
    name: Release Block Policy
    runs-on: ubuntu-latest
    needs: [functional-gate, performance-gate, security-gate]
    steps:
      - run: echo "Critical defects cannot pass release gate"
      - run: echo "Require status checks to pass before merging"
