name: Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate (build/typecheck/lint/test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Stage 1 - Typecheck
        run: npm run typecheck

      - name: Stage 2 - Lint
        run: npm run lint

      - name: Stage 3 - Test
        run: npm test

      - name: Stage 4 - Build
        run: npm run build
